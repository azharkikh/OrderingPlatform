name: Integration Tests + Coverage

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run unit tests
        run: dotnet test tests/UnitTests/UnitTests.csproj --collect:"XPlat Code Coverage" --settings coverlet.runsettings --results-directory coverage-raw

      - name: Stage unit coverage report
        run: |
          mkdir -p coverage
          cp "$(find coverage-raw -name 'coverage.cobertura.xml' | head -1)" coverage/unit.xml

      - name: Upload unit coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/unit.xml
          retention-days: 1

  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up --build -d

      - name: Wait for services to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/Orders > /dev/null 2>&1 && \
               curl -sf http://localhost:8081/Cart > /dev/null 2>&1; then
              echo "Services are ready"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 1
          done
          echo "Services did not start in time"
          docker compose logs
          exit 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run integration tests
        run: dotnet test tests/IntegrationTests/IntegrationTests.csproj --logger "trx;LogFileName=results.trx"

      - name: Flush coverage reports
        run: |
          docker exec orderingplatform-order-1 dotnet-coverage shutdown order-session
          docker exec orderingplatform-cart-1 dotnet-coverage shutdown cart-session
          sleep 3

      - name: Stop services
        if: always()
        run: docker compose down --timeout 10

      - name: Fix coverage-out permissions
        run: sudo chown -R $(id -u):$(id -g) coverage-out/

      - name: Stage integration coverage reports
        run: |
          mkdir -p coverage
          cp coverage-out/coverage.order.cobertura.xml coverage/order.xml
          cp coverage-out/coverage.cart.cobertura.xml coverage/cart.xml

      - name: Upload integration coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage/*.xml
          retention-days: 1

  coverage-report:
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download all coverage reports into one directory
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          path: coverage
          merge-multiple: true

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate HTML report and GitHub summary
        run: |
          reportgenerator \
            -reports:"coverage/*.xml" \
            -targetdir:"coverage-report" \
            -reporttypes:"Html;MarkdownSummaryGithub"

      - name: Publish coverage summary to job summary
        run: cat coverage-report/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-html
          path: coverage-report
          retention-days: 7
