name: Integration Tests + Coverage

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run unit tests
        run: dotnet test tests/UnitTests/UnitTests.csproj --collect:"XPlat Code Coverage" --settings coverlet.runsettings --results-directory coverage-out/unit

      - name: Upload unit coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-tests
          path: coverage-out/unit
          retention-days: 1

  integration-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up --build -d

      - name: Wait for services to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/Orders > /dev/null 2>&1 && \
               curl -sf http://localhost:8081/Cart > /dev/null 2>&1; then
              echo "Services are ready"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 1
          done
          echo "Services did not start in time"
          docker compose logs
          exit 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Run integration tests
        run: dotnet test tests/IntegrationTests/IntegrationTests.csproj --logger "trx;LogFileName=results.trx"

      - name: Flush coverage reports
        run: |
          docker exec orderingplatform-order-1 dotnet-coverage shutdown order-session
          docker exec orderingplatform-cart-1 dotnet-coverage shutdown cart-session
          sleep 3

      - name: Stop services
        if: always()
        run: docker compose down --timeout 10

      - name: Fix coverage-out permissions
        run: sudo chown -R $(id -u):$(id -g) coverage-out/

      - name: Upload integration coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration-tests
          path: |
            coverage-out/coverage.order.cobertura.xml
            coverage-out/coverage.cart.cobertura.xml
          retention-days: 1

  merge-coverage:
    needs: [unit-tests, integration-tests]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download unit coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-unit-tests
          path: coverage-out/unit

      - name: Download integration coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-integration-tests
          path: coverage-out/integration

      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage

      - name: Merge all coverage reports
        run: |
          UNIT_COV=$(find coverage-out/unit -name "coverage.cobertura.xml" | head -1)
          dotnet-coverage merge \
            "$UNIT_COV" \
            coverage-out/integration/coverage.order.cobertura.xml \
            coverage-out/integration/coverage.cart.cobertura.xml \
            --output coverage-out/coverage.merged.cobertura.xml \
            --output-format cobertura

      - name: Upload merged coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-out/coverage.merged.cobertura.xml
